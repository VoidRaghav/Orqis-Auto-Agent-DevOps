services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      ORQIS_DEV_MODE: "1"
      ORQIS_PROJECT_ROOT: /app
    depends_on:
      - redis
    command: ["orqis", "start", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
